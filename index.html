<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webhook Sender</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 20px;
  width: 350px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  margin-bottom: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

input[type="file"] {
  padding: 5px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="card">
  <h2>🚀 Webhook Sender</h2>

  <textarea id="message" placeholder="Tulis pesan..."></textarea>
  <input type="file" id="file">

  <button onclick="send()">Kirim</button>

  <div class="status" id="status"></div>
</div>

<script>
const webhook = "https://discord.com/api/webhooks/1426243015332335700/e0BJgr7YyV7Sa4GK9G7duNfFvqn25SgsCdE-9BwpUvY32St_jGyoru6Yf0jsiIOQK7Eq";

function send() {
  const fileInput = document.getElementById("file");
  const message = document.getElementById("message").value;
  const status = document.getElementById("status");

  let formData = new FormData();

  if (fileInput.files.length > 0) {
    formData.append("file", fileInput.files[0]);
  }

  formData.append("content", message);

  fetch(webhook, {
    method: "POST",
    body: formData
  })
  .then(() => {
    status.innerText = "✅ Terkirim!";
  })
  .catch(() => {
    status.innerText = "❌ Gagal kirim";
  });
}
</script>

</body>
    </html>
